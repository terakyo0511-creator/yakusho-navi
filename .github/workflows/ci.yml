name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci || (echo "===== npm-debug.log =====" && tail -n 200 /home/runner/.npm/_logs/*.log && exit 1)
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run
      - name: Check for translation placeholders
        run: |
          if rg -q '"\?{2,}"|"TODO"|C\? quan' messages content; then
            echo "::error::Translation placeholders found"
            exit 1
          fi
